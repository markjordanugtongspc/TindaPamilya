<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TindaPamilya Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/js/main.js"></script>
  </head>
  <body class="font-sans min-h-full bg-background text-text antialiased">
    <main class="mx-auto w-full max-w-4xl px-4 py-8 sm:px-6">
      <section class="rounded-2xl border border-text/10 bg-secondary p-5 shadow-sm">
        <div class="flex items-center justify-between gap-3">
          <h1 class="text-2xl font-bold">Dashboard</h1>
          <button
            id="logout-button"
            type="button"
            class="cursor-pointer rounded-xl bg-accent px-4 py-2 text-sm font-semibold text-white transition hover:bg-primary focus:outline-none focus:ring-4 focus:ring-accent/35"
          >
            Logout
          </button>
        </div>
        <p class="mt-2 text-sm text-text/75">Protected page for authenticated users.</p>
      </section>

      <section class="mt-5 rounded-2xl border border-text/10 bg-secondary p-5 shadow-sm">
        <div class="flex items-center gap-4">
          <img
            id="user-profile-image"
            src="/assets/svg/logo-store-dark.svg"
            alt="User profile"
            class="h-14 w-14 rounded-full border border-text/10 object-cover"
          />
          <div>
            <p id="user-full-name" class="text-lg font-semibold">Loading...</p>
            <p id="user-role" class="text-sm text-text/70">Role: ...</p>
          </div>
        </div>
      </section>
      <p class="mt-6 text-center text-xs text-text/60">TindaPamilya v0.4.1</p>
    </main>
  </body>
</html>
