<div id="tp-mobile-top-nav" class="fixed right-3 top-3 z-50 flex items-center gap-2 transition-opacity duration-300 md:hidden">
  <button
    type="button"
    data-mobile-notification
    data-has-new="false"
    aria-label="Notifications"
    class="tp-notification-btn group relative inline-flex cursor-pointer items-center justify-center p-0 text-text transition focus:outline-none"
  >
    <span class="tp-notification-icon-wrap relative block h-6 w-6">
      <svg class="tp-notif-icon-default absolute inset-0 h-6 w-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.133 12.632v-1.8a5.406 5.406 0 0 0-4.154-5.262.955.955 0 0 0 .021-.106V3.1a1 1 0 0 0-2 0v2.364a.955.955 0 0 0 .021.106 5.406 5.406 0 0 0-4.154 5.262v1.8C6.867 15.018 5 15.614 5 16.807 5 17.4 5 18 5.538 18h12.924C19 18 19 17.4 19 16.807c0-1.193-1.867-1.789-1.867-4.175ZM8.823 19a3.453 3.453 0 0 0 6.354 0H8.823Z"/></svg>
      <svg class="tp-notif-icon-hover absolute inset-0 h-6 w-6 opacity-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M11.209 3.816a1 1 0 0 0-1.966.368l.325 1.74a5.338 5.338 0 0 0-2.8 5.762l.276 1.473.055.296c.258 1.374-.228 2.262-.63 2.998-.285.52-.527.964-.437 1.449.11.586.22 1.173.75 1.074l12.7-2.377c.528-.1.418-.685.308-1.27-.103-.564-.636-1.123-1.195-1.711-.606-.636-1.243-1.306-1.404-2.051-.233-1.085-.275-1.387-.303-1.587-.009-.063-.016-.117-.028-.182a5.338 5.338 0 0 0-5.353-4.39l-.298-1.592Z"/><path fill-rule="evenodd" d="M6.539 4.278a1 1 0 0 1 .07 1.412c-1.115 1.23-1.705 2.605-1.83 4.26a1 1 0 0 1-1.995-.15c.16-2.099.929-3.893 2.342-5.453a1 1 0 0 1 1.413-.069Z" clip-rule="evenodd"/><path d="M8.95 19.7c.7.8 1.7 1.3 2.8 1.3 1.6 0 2.9-1.1 3.3-2.5l-6.1 1.2Z"/></svg>
      <svg class="tp-notif-icon-new absolute inset-0 hidden h-6 w-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M17.133 12.632v-1.8a5.406 5.406 0 0 0-4.154-5.262.955.955 0 0 0 .021-.106V3.1a1 1 0 0 0-2 0v2.364a.955.955 0 0 0 .021.106 5.406 5.406 0 0 0-4.154 5.262v1.8C6.867 15.018 5 15.614 5 16.807 5 17.4 5 18 5.538 18h12.924C19 18 19 17.4 19 16.807c0-1.193-1.867-1.789-1.867-4.175ZM6 6a1 1 0 0 1-.707-.293l-1-1a1 1 0 0 1 1.414-1.414l1 1A1 1 0 0 1 6 6Zm-2 4H3a1 1 0 0 1 0-2h1a1 1 0 1 1 0 2Zm14-4a1 1 0 0 1-.707-1.707l1-1a1 1 0 1 1 1.414 1.414l-1 1A1 1 0 0 1 18 6Zm3 4h-1a1 1 0 1 1 0-2h1a1 1 0 1 1 0 2ZM8.823 19a3.453 3.453 0 0 0 6.354 0H8.823Z"/></svg>
    </span>
    <span data-notification-badge class="absolute -inset-e-1.5 -top-1.5 inline-flex h-5 min-w-5 items-center justify-center rounded-full border-2 border-secondary bg-red-500 px-1 text-[0.62rem] font-bold leading-none text-white">0</span>
  </button>

  <button
    type="button"
    data-mobile-user-summary
    class="inline-flex cursor-pointer items-center p-0"
    aria-label="Open profile"
  >
    <img data-user-avatar src="/assets/svg/logo-store-dark.svg" alt="User avatar" class="h-8 w-8 rounded-full object-cover ring-1 ring-black/10 dark:ring-white/20" />
  </button>
</div>
<div id="tp-mobile-search-bar" class="fixed left-3 right-22 top-3 z-40 transition-opacity duration-300 md:hidden">
  <label class="relative block">
    <span class="sr-only">Search menu items</span>
    <svg
      class="pointer-events-none absolute left-3.5 top-1/2 h-5 w-5 -translate-y-1/2 text-text/45"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      aria-hidden="true"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
    </svg>
    <input
      type="search"
      name="menu-search-mobile"
      placeholder="Search"
      class="w-full cursor-text rounded-full border border-white/55 bg-secondary/95 py-2.5 pl-11 pr-3.5 text-sm text-text shadow-sm ring-1 ring-black/5 transition placeholder:text-text/45 focus:outline-none focus:ring-2 focus:ring-primary/30 dark:border-white/10 dark:bg-gray-900/90 dark:ring-white/10"
      autocomplete="off"
    />
  </label>
</div>

<!-- Mobile Bottom Navigation (Flowbite Redesign + Labels) -->
<div id="tp-mobile-bottom-nav" class="fixed bottom-4 left-1/2 z-50 h-16 w-[94%] max-w-md -translate-x-1/2 rounded-full border border-text/10 bg-secondary/95 shadow-2xl ring-1 ring-black/5 backdrop-blur-md transition-opacity duration-300 dark:border-white/10 dark:bg-gray-900/90 md:hidden">
  <div class="mx-auto grid h-full max-w-lg grid-cols-5 items-center">
    
    <!-- Menu -->
    <button data-bottom-nav-link="menu" type="button" class="tp-nav-link-mobile group relative flex flex-col items-center justify-center gap-0.5 rounded-s-full py-1 text-text/60 transition-colors hover:text-primary">
      <svg class="h-6 w-6 text-current transition-colors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m4 12 8-8 8 8M6 10.5V19a1 1 0 0 0 1 1h3v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h3a1 1 0 0 0 1-1v-8.5"/></svg>
      <span class="text-[0.62rem] font-bold uppercase tracking-wider text-current">Menu</span>
    </button>

    <!-- Products -->
    <button data-bottom-nav-link="products" type="button" class="tp-nav-link-mobile group relative flex flex-col items-center justify-center gap-0.5 py-1 text-text/60 transition-colors hover:text-primary">
      <svg class="h-6 w-6 text-current transition-colors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10V6a3 3 0 0 1 3-3 3 3 0 0 1 3 3v4m3-2 .917 11.923A1 1 0 0 1 17.92 21H6.08a1 1 0 0 1-.997-1.077L6 8h12Z"/></svg>
      <span class="text-[0.62rem] font-bold uppercase tracking-wider text-current">Products</span>
    </button>

    <!-- Floating Scan Button -->
    <div class="relative flex items-center justify-center">
      <button 
        data-bottom-nav-link="scan" 
        data-scanner-open="true"
        type="button" 
        class="absolute -top-11 flex h-16 w-16 cursor-pointer items-center justify-center rounded-2xl bg-primary text-white shadow-xl shadow-primary/30 outline-none ring-4 ring-secondary transition hover:scale-110 hover:bg-accent active:scale-95 dark:ring-gray-900">
        <img src="/assets/svg/barcode-scanner.svg" alt="Scan" class="h-7 w-7 brightness-0 invert" />
        <span class="sr-only">Scan Barcode</span>
      </button>
      <span class="mt-8 text-[0.68rem] font-black uppercase tracking-widest text-primary opacity-90">Scan</span>
    </div>

    <!-- Settings -->
    <button data-bottom-nav-link="settings" type="button" class="tp-nav-link-mobile group relative flex flex-col items-center justify-center gap-0.5 py-1 text-text/60 transition-colors hover:text-primary">
      <svg class="h-6 w-6 text-current transition-colors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M6 4v10m0 0a2 2 0 1 0 0 4m0-4a2 2 0 1 1 0 4m0 0v2m6-16v2m0 0a2 2 0 1 0 0 4m0-4a2 2 0 1 1 0 4m0 0v10m6-16v10m0 0a2 2 0 1 0 0 4m0-4a2 2 0 1 1 0 4m0 0v2"/></svg>
      <span class="text-[0.62rem] font-bold uppercase tracking-wider text-current">Settings</span>
    </button>

    <!-- Profile -->
    <button data-bottom-nav-link="profile" type="button" class="tp-nav-link-mobile group relative flex flex-col items-center justify-center gap-0.5 rounded-e-full py-1 text-text/60 transition-colors hover:text-primary">
      <svg class="h-6 w-6 text-current transition-colors" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0 0a8.949 8.949 0 0 0 4.951-1.488A3.987 3.987 0 0 0 13 16h-2a3.987 3.987 0 0 0-3.951 3.512A8.948 8.948 0 0 0 12 21Zm3-11a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      <span class="text-[0.62rem] font-bold uppercase tracking-wider text-current">Profile</span>
    </button>
  </div>
</div>
