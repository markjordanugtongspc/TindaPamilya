<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TindaPamilya — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Shantell+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    class="font-sans min-h-full bg-background text-text antialiased transition-colors duration-300"
  >
    <!-- Skip link target: page title for assistive tech -->
    <header class="sr-only">
      <h1>TindaPamilya — Sign in</h1>
    </header>

    <div
      data-intro-splash
      class="fixed inset-0 z-40 hidden flex-col items-center justify-center gap-4 bg-primary opacity-100 transition-opacity duration-700 lg:hidden"
    >
      <img
        data-intro-logo
        src="/assets/svg/logo-store-dark.svg"
        alt="TindaPamilya logo"
        width="220"
        height="220"
        class="-translate-x-24 h-40 w-40 drop-shadow opacity-0 transition-all duration-700 sm:h-48 sm:w-48"
      />
      <p
        data-intro-typing
        data-full-text="TINDAPAMILYA POS"
        class="min-h-10 text-2xl font-extrabold tracking-widest text-gray-950/95 opacity-0 drop-shadow-[0_3px_8px_rgba(0,0,0,0.28)] transition-opacity duration-500"
      ></p>
    </div>

    <main class="min-h-screen">
      <div
        class="grid min-h-screen grid-cols-1 transition-[grid-template-rows] duration-300 lg:grid-cols-2"
      >
        <!-- Left: brand -->
        <section
          class="relative hidden min-h-[min(44vh,26rem)] flex-col bg-primary lg:flex lg:min-h-screen"
          aria-label="TindaPamilya branding"
        >
          <div
            class="flex shrink-0 items-center gap-3 px-6 pb-2 pt-6 sm:gap-4 sm:px-8 sm:pt-8 lg:px-10 lg:pt-10"
          >
            <img
              src="/assets/svg/logo-store-dark.svg"
              alt=""
              width="48"
              height="48"
              class="h-10 w-10 shrink-0 drop-shadow sm:h-12 sm:w-12"
            />
            <p
              class="text-lg font-semibold tracking-tight text-white drop-shadow-sm sm:text-xl"
            >
              TindaPamilya
            </p>
          </div>

          <div
            class="flex flex-1 flex-col items-center justify-center px-6 pb-10 pt-4 text-center sm:px-10 lg:px-14"
          >
            <h2
              class="text-3xl font-bold tracking-tight text-white drop-shadow-sm sm:text-4xl"
            >
              TindaPamilya POS
            </h2>
            <p
              class="mt-4 max-w-md text-pretty text-sm leading-relaxed text-white/90 transition-opacity duration-300 sm:text-base"
            >
              Run your family sari-sari store from the phone or counter: sell
              faster, watch stock, and keep day-to-day work easy for everyone who
              minds the till.
            </p>
          </div>
        </section>

        <!-- Right: sign-in -->
        <section
          class="relative flex min-h-[min(56vh,28rem)] flex-col bg-background lg:min-h-screen"
          aria-label="Sign in"
        >
          <div
            class="absolute right-4 top-4 z-10 sm:right-6 sm:top-6 lg:right-8 lg:top-8"
          >
            <button
              type="button"
              data-theme-toggle
              class="cursor-pointer rounded-full border-0 bg-transparent p-2 text-gray-700 shadow-none transition duration-200 hover:bg-gray-200/70 hover:text-accent hover:shadow-sm focus:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 active:scale-95 dark:text-gray-200 dark:hover:bg-white/10 dark:hover:text-primary dark:hover:shadow-none dark:focus-visible:ring-primary/45"
              aria-label="Toggle dark mode"
              aria-pressed="false"
            >
              <span class="block transition-transform duration-200 hover:scale-110 dark:hidden" aria-hidden="true">
                <svg
                  class="h-5 w-5"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
                  />
                </svg>
              </span>
              <span class="hidden transition-transform duration-200 hover:scale-110 dark:block" aria-hidden="true">
                <svg
                  class="h-5 w-5"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                  />
                </svg>
              </span>
            </button>
          </div>

          <div
            data-auth-main
            class="flex flex-1 flex-col justify-center px-5 py-12 transition-all duration-500 sm:px-8 md:px-12 lg:px-14 lg:py-14 xl:px-20"
          >
            <div class="mx-auto w-full max-w-md">
              <div class="mb-5 flex items-center justify-center lg:hidden">
                <img
                  data-logo-theme
                  src="/assets/svg/logo-store-dark.svg"
                  alt="TindaPamilya logo"
                  width="110"
                  height="110"
                  class="h-20 w-20 drop-shadow"
                />
              </div>
              <div class="text-center">
                <h2 class="text-2xl font-bold tracking-tight text-text sm:text-3xl">
                  Welcome back
                </h2>
                <div
                  class="mt-2 max-w-full overflow-x-auto pb-1 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
                >
                  <p
                    class="whitespace-nowrap text-sm text-gray-600 transition-colors duration-300 dark:text-gray-400"
                  >
                    Sign in to your store dashboard.
                  </p>
                </div>
              </div>

              <form id="login-form" class="mt-8 space-y-5 text-left" action="#" method="post">
                <div data-email-input-wrap>
                  <label class="mb-2 block text-sm font-medium text-text" for="email">
                    Email
                  </label>
                  <div class="relative">
                    <div
                      class="pointer-events-none absolute inset-y-0 inset-s-0 flex items-center ps-3.5"
                    >
                      <span class="relative h-5 w-5 shrink-0">
                        <img
                          data-email-icon-closed
                          data-form-icon
                          src="/assets/svg/email.svg"
                          alt=""
                          width="20"
                          height="20"
                          class="absolute inset-0 h-5 w-5 object-contain transition-opacity duration-300 ease-out"
                        />
                        <img
                          data-email-icon-open
                          data-form-icon
                          src="/assets/svg/email-open.svg"
                          alt=""
                          width="20"
                          height="20"
                          class="absolute inset-0 h-5 w-5 object-contain opacity-0 transition-opacity duration-300 ease-out"
                        />
                      </span>
                    </div>
                    <input
                      id="email"
                      name="email"
                      type="email"
                      autocomplete="email"
                      required
                      placeholder="name@store.com"
                      class="block w-full rounded-xl border border-gray-300 bg-gray-50 p-2.5 ps-11 text-sm text-text shadow-sm transition placeholder:text-gray-400 focus:border-accent focus:ring-2 focus:ring-accent/30 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-accent dark:focus:ring-accent/40"
                    />
                  </div>
                </div>

                <div data-password-input-wrap>
                  <label class="mb-2 block text-sm font-medium text-text" for="password">
                    Password
                  </label>
                  <div class="relative">
                    <div
                      class="pointer-events-none absolute inset-y-0 inset-s-0 flex items-center ps-3.5"
                    >
                      <img
                        data-form-icon
                        src="/assets/svg/password.svg"
                        alt=""
                        width="20"
                        height="20"
                        class="h-5 w-5 object-contain opacity-80"
                      />
                    </div>
                    <input
                      id="password"
                      name="password"
                      type="password"
                      data-password-input
                      autocomplete="current-password"
                      required
                      placeholder="••••••••"
                      class="block w-full rounded-xl border border-gray-300 bg-gray-50 p-2.5 ps-11 pe-12 text-sm text-text shadow-sm transition placeholder:text-gray-400 focus:border-accent focus:ring-2 focus:ring-accent/30 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-500 dark:focus:border-accent dark:focus:ring-accent/40"
                    />
                    <button
                      type="button"
                      data-password-toggle
                      class="absolute inset-e-2 top-1/2 inline-flex h-9 w-9 -translate-y-1/2 cursor-pointer items-center justify-center rounded-lg text-gray-600 transition hover:bg-gray-200/80 focus:outline-none focus:ring-2 focus:ring-accent/30 dark:text-gray-300 dark:hover:bg-gray-600/80 dark:focus:ring-accent/40"
                      aria-label="Show password"
                      aria-pressed="false"
                      title="Show password"
                    >
                      <span class="relative h-5 w-5">
                        <img
                          data-eye-show
                          data-form-icon
                          src="/assets/svg/show.svg"
                          alt=""
                          width="20"
                          height="20"
                          class="absolute inset-0 h-5 w-5 object-contain transition-all duration-300 ease-out"
                        />
                        <img
                          data-eye-hide
                          data-form-icon
                          src="/assets/svg/hide.svg"
                          alt=""
                          width="20"
                          height="20"
                          class="absolute inset-0 h-5 w-5 scale-90 object-contain opacity-0 transition-all duration-300 ease-out"
                        />
                      </span>
                    </button>
                  </div>
                  <p
                    id="login-error"
                    class="mt-2 hidden border-s-2 border-red-500 ps-2 text-xs font-medium text-red-600 dark:border-red-400 dark:text-red-400"
                    role="alert"
                    aria-live="polite"
                  ></p>
                </div>

                <div class="flex flex-wrap items-center justify-between gap-3 text-sm">
                  <label
                    class="inline-flex cursor-pointer select-none items-center gap-2 font-medium text-gray-700 transition-colors dark:text-gray-300"
                  >
                    <input
                      id="save-password"
                      name="remember"
                      type="checkbox"
                      class="h-4 w-4 cursor-pointer rounded border-gray-300 bg-gray-100 text-accent focus:ring-2 focus:ring-accent/40 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-accent/50"
                    />
                    Save Password
                  </label>
                  <a
                    class="cursor-pointer whitespace-nowrap font-medium text-accent underline-offset-2 transition hover:underline focus:outline-none focus:ring-2 focus:ring-accent/30 dark:text-primary dark:focus:ring-primary/40"
                    href="#"
                  >
                    Forgot password?
                  </a>
                </div>

                <button
                  type="submit"
                  class="w-full cursor-pointer rounded-xl bg-accent px-4 py-4 text-center text-base font-semibold text-white shadow-md transition hover:bg-primary hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-accent/35 active:scale-[0.99] dark:bg-accent dark:hover:bg-primary dark:focus:ring-primary/40"
                >
                  LOG IN
                </button>

                <div class="space-y-4 pt-2">
                  <p class="text-center text-xs font-medium uppercase tracking-[0.2em] text-text/60">
                    OR
                  </p>
                  <button
                    type="button"
                    class="w-full cursor-pointer rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm font-semibold text-gray-700 shadow-sm transition hover:border-gray-400 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-accent/35 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100 dark:hover:bg-gray-700"
                  >
                    <span class="flex items-center justify-center gap-3">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 48 48"
                        class="h-5 w-5"
                        aria-hidden="true"
                      >
                        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3L37.6 9C34.1 5.7 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5Z"/>
                        <path fill="#FF3D00" d="M6.3 14.7 12.9 19.5C14.7 15 19 12 24 12c3 0 5.8 1.1 7.9 3L37.6 9C34.1 5.7 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7Z"/>
                        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.4-5.1l-6.2-5.2c-2 1.5-4.5 2.3-7.2 2.3-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.7 39.6 16.3 44 24 44Z"/>
                        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.8-2.8 4.9-5 6.3l.1-.1 6.2 5.2c-.4.3 7.4-5.4 7.4-15.4 0-1.3-.1-2.3-.4-3.5Z"/>
                      </svg>
                      Continue with Google
                    </span>
                  </button>
                </div>

                <p
                  data-app-version
                  class="mt-6 text-center text-xs text-text/60 transition-colors duration-300 dark:text-text/45"
                ></p>
              </form>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- Login success: light glass veil (form stays visible); rounded floats only — max-lg drawers / lg+ doors -->
    <div
      id="login-success-overlay"
      class="pointer-events-none fixed inset-0 z-[100] hidden flex-col items-center justify-center opacity-0 transition-none"
      aria-hidden="true"
    >
      <div
        class="absolute inset-0 bg-white/35 backdrop-blur-md dark:bg-gray-950/25 dark:backdrop-blur-lg"
        aria-hidden="true"
      ></div>
      <div class="pointer-events-none absolute inset-0 overflow-hidden">
        <div
          data-login-drawer-top
          class="tp-login-drawer absolute left-0 right-0 top-0 h-[44vh] bg-gradient-to-b from-white/30 to-transparent backdrop-blur-sm sm:h-[46vh] lg:hidden"
        ></div>
        <div
          data-login-drawer-bottom
          class="tp-login-drawer absolute bottom-0 left-0 right-0 h-[44vh] bg-gradient-to-t from-white/30 to-transparent backdrop-blur-sm sm:h-[46vh] lg:hidden"
        ></div>
        <div
          data-login-gate-left
          class="tp-login-gate absolute inset-y-0 left-0 hidden w-1/2 bg-gradient-to-r from-white/25 to-transparent backdrop-blur-sm lg:block lg:backdrop-blur-md"
        ></div>
        <div
          data-login-gate-right
          class="tp-login-gate absolute inset-y-0 right-0 hidden w-1/2 bg-gradient-to-l from-white/25 to-transparent backdrop-blur-sm lg:block lg:backdrop-blur-md"
        ></div>
      </div>
      <div
        class="relative z-10 flex w-full max-w-md flex-col items-center px-5 perspective-[900px]"
      >
        <p
          class="mb-8 text-center text-[0.7rem] font-semibold uppercase tracking-[0.28em] text-gray-900 drop-shadow-sm dark:text-white"
        >
          Point of sale
        </p>
        <div
          class="flex flex-col items-center justify-center opacity-0"
          data-login-success-icon
        >
          <div
            class="transform-gpu [transform-style:preserve-3d]"
            data-login-success-roll-target
          >
            <div
              class="flex h-24 w-24 items-center justify-center rounded-full bg-accent p-4 shadow-xl ring-4 ring-white/40 dark:ring-white/10"
            >
              <svg
                class="h-12 w-12 text-white"
                aria-hidden="true"
                fill="currentColor"
                viewBox="0 0 20 20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                  clip-rule="evenodd"
                ></path>
              </svg>
            </div>
          </div>
          <p
            data-login-loading-label
            class="mt-8 min-h-[1.35rem] text-center text-sm font-semibold tracking-tight text-gray-900 dark:text-gray-50"
            aria-live="polite"
          ></p>
          <div
            class="mt-5 h-2.5 w-full max-w-[min(100%,18rem)] overflow-hidden rounded-full bg-gray-400/35 shadow-inner dark:bg-white/20"
            aria-hidden="true"
          >
            <div
              data-login-progress-bar
              class="h-full w-0 rounded-full bg-accent shadow-sm transition-[width] duration-200 ease-out"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
